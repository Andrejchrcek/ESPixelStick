<!DOCTYPE html>
<html>
<head>
    <title>ESP-NOW Settings</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <h1>ESP-NOW Settings</h1>
    <form id="espnow-form">
        <div>
            <label for="enabled">Enable ESP-NOW:</label>
            <input type="checkbox" id="enabled" name="enabled">
        </div>
        <div>
            <label for="channel">Channel:</label>
            <select id="channel" name="channel">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
                <option value="11">11</option>
                <option value="12">12</option>
                <option value="13">13</option>
            </select>
        </div>
        <div>
            <label for="mac-address">Sender MAC Address:</label>
            <input type="text" id="mac-address" name="mac_address">
            <span>(Leave blank to accept from any)</span>
        </div>
        <div>
            <label for="priority">Priority:</label>
            <select id="priority" name="priority">
                <option value="espnow">ESP-NOW Priority</option>
                <option value="wifi">WiFi Priority</option>
                <option value="timeout">Timeout</option>
            </select>
        </div>
        <div>
            <label for="timeout">Timeout (seconds):</label>
            <input type="number" id="timeout" name="timeout" value="5">
        </div>
        <button type="submit">Save</button>
    </form>
    <script src="espnow.js"></script>
</body>
</html>
